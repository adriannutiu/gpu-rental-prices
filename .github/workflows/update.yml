name: Update GPU price data

# Self-updating mirror: pulls the latest verified snapshot from the live public
# API once a day and commits it. No secrets, no cross-repo auth — just the public
# feed that powers gpurentalprices.com. "Updated daily" is the whole point.

on:
  schedule:
    - cron: "40 6 * * *"   # 06:40 UTC, shortly after the site's daily scrape
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch latest snapshot
        run: |
          set -euo pipefail
          curl -sSfL https://gpurentalprices.com/api/latest.json -o data/latest.json
          DATE=$(python3 -c "import json;print(json.load(open('data/latest.json'))['date'])")
          cp data/latest.json "data/snapshots/${DATE}.json"
          echo "Fetched snapshot for ${DATE}"

      - name: Prune to a rolling 90-day window
        run: |
          ls -1 data/snapshots/*.json | sort | head -n -90 | xargs -r rm -v

      - name: Commit if changed
        run: |
          git config user.name  "gpu-prices-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "data: daily GPU price snapshot ($(date -u +%Y-%m-%d))"
            git push
          fi

      - name: Sync dataset to HuggingFace
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          pip install -q "huggingface_hub[cli]"
          hf upload gpurentalprices/gpu-rental-prices data data \
            --repo-type dataset --delete "**" \
            --commit-message "data: daily sync from GitHub mirror"
